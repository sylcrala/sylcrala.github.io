  <main> 

    <section>
      <h3><i>Need to get in touch? </i></h3>
      <h4><i>Fill out this form and I'll get back to you as soon as possible!</i></h4>
      <form
        action="https://formspree.io/f/mdkzrwbn"
        method="POST"
      >
        <div>
          <label for = "name">
            What's your name?<br />
            <input type = "text" name = "name"> <br />
          </label>
        </div>
        <div>
            <label for = "phone">
                What's your phone number?<br />
                <input type = "tel" name = "phone"><br />
            </label>
        </div>
        <div>
          <label for = "email">
            What's your email?<br />
            <input type = "email" name = "email"> <br />
          </label>
        </div>
        <div>
          <label>
            What would you like to talk about?<br />
            <textarea name = "message"></textarea> <br />
          </label>
        </div>
        <div>
            <label>
                How should I get back to you?<br />
                <input type = "checkbox" name = "contact_preference" value = "email"> Email
                <input type = "checkbox" name = "contact_preference" value = "phone"> Phone
                <input type = "checkbox" name = "contact_preference" value = "either"> Either<br />
            </label>
        </div>

        <button type="submit">Send</button>

      </form>
    </section>
